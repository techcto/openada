name: Release OpenADA to AWS Marketplace

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to build and publish without the leading v'
        required: true

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  MP_AWS_ECR: ${{ vars.MP_AWS_ECR || '709825985650.dkr.ecr.us-east-1.amazonaws.com' }}
  MP_AWS_ECR_ACCOUNT_ID: ${{ vars.MP_AWS_ECR_ACCOUNT_ID || '709825985650' }}
  UI_REPOSITORY: ${{ vars.OPENADA_UI_REPOSITORY || 'solodev/openada-ui' }}
  API_REPOSITORY: ${{ vars.OPENADA_API_REPOSITORY || 'solodev/openada-api' }}
  WORKER_REPOSITORY: ${{ vars.OPENADA_WORKER_REPOSITORY || 'solodev/openada-worker' }}
  OPENADA_CFT_BUCKET: ${{ vars.OPENADA_CFT_BUCKET || 'openada-us' }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          case "$version" in
            ''|*[!0-9A-Za-z.-]*)
              echo "Invalid release version: $version" >&2
              exit 1
              ;;
          esac
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate AWS Marketplace configuration
        env:
          MP_AWS_ACCESS_KEY_ID: ${{ vars.MP_AWS_ACCESS_KEY_ID }}
          MP_AWS_SECRET_ACCESS_KEY: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}
          MP_AWS_MARKETPLACE_PRODUCT_ID: ${{ vars.MP_AWS_MARKETPLACE_PRODUCT_ID }}
        run: |
          test -n "$MP_AWS_ACCESS_KEY_ID" || {
            echo 'Missing repository variable MP_AWS_ACCESS_KEY_ID.' >&2
            exit 1
          }
          test -n "$MP_AWS_SECRET_ACCESS_KEY" || {
            echo 'Missing repository secret MP_AWS_SECRET_ACCESS_KEY.' >&2
            exit 1
          }
          test -n "$MP_AWS_MARKETPLACE_PRODUCT_ID" || {
            echo 'Missing repository variable MP_AWS_MARKETPLACE_PRODUCT_ID.' >&2
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ vars.MP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}

      - name: Login to Marketplace ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$MP_AWS_ECR"

      - name: Verify AWS publishing identity
        run: aws sts get-caller-identity

      - name: Verify Marketplace ECR repositories
        run: |
          for repository in "$UI_REPOSITORY" "$API_REPOSITORY" "$WORKER_REPOSITORY"; do
            aws ecr describe-repositories \
              --registry-id "$MP_AWS_ECR_ACCOUNT_ID" \
              --repository-names "$repository" >/dev/null || {
              echo "Missing ECR repository: $MP_AWS_ECR/$repository" >&2
              echo "Confirm the publishing principal can access registry $MP_AWS_ECR_ACCOUNT_ID." >&2
              exit 1
            }
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.app
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.MP_AWS_ECR }}/${{ env.UI_REPOSITORY }}:${{ steps.version.outputs.value }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.api
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.MP_AWS_ECR }}/${{ env.API_REPOSITORY }}:${{ steps.version.outputs.value }}

      - name: Build and publish worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.worker
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.MP_AWS_ECR }}/${{ env.WORKER_REPOSITORY }}:${{ steps.version.outputs.value }}

      - name: Publish versioned CloudFormation templates
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          for template in openada.yaml openada-existing.yaml; do
            rendered="/tmp/$template"
            sed \
              -e "s|{MP_AWS_ECR}|$MP_AWS_ECR|g" \
              -e "s|{UI_REPOSITORY}|$UI_REPOSITORY|g" \
              -e "s|{API_REPOSITORY}|$API_REPOSITORY|g" \
              -e "s|{WORKER_REPOSITORY}|$WORKER_REPOSITORY|g" \
              -e "s|{RELEASE_VERSION}|$RELEASE_VERSION|g" \
              "devops/cloudformation/$template" > "$rendered"
            aws s3 cp "$rendered" \
              "s3://$OPENADA_CFT_BUCKET/cloudformation/$template" \
              --content-type text/yaml --cache-control no-cache --region "$AWS_REGION" --no-progress
            versioned="${template%.yaml}-${RELEASE_VERSION}.yaml"
            aws s3 cp "$rendered" \
              "s3://$OPENADA_CFT_BUCKET/cloudformation/$versioned" \
              --content-type text/yaml --cache-control no-cache --region "$AWS_REGION" --no-progress
          done
          aws s3 cp devops/cloudformation/README.md \
            "s3://$OPENADA_CFT_BUCKET/cloudformation/README.md" \
            --content-type text/markdown --cache-control no-cache --region "$AWS_REGION" --no-progress

      - name: Submit AWS Marketplace changeset
        env:
          MP_AWS_MARKETPLACE_PRODUCT_ID: ${{ vars.MP_AWS_MARKETPLACE_PRODUCT_ID }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: bash devops/changeset.sh
