name: Release OpenADA MCP AgentCore

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to build and publish without the leading v'
        required: true

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  MP_AWS_ECR: ${{ vars.MP_AWS_ECR || '709825985650.dkr.ecr.us-east-1.amazonaws.com' }}
  AGENTCORE_REPOSITORY: ${{ vars.OPENADA_AGENTCORE_REPOSITORY || 'solodev/openada-agentcore' }}
  OPENADA_CFT_BUCKET: ${{ vars.OPENADA_CFT_BUCKET || 'openada-us' }}

jobs:
  release-agentcore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          case "$version" in
            ''|*[!0-9A-Za-z.-]*)
              echo "Invalid release version: $version" >&2
              exit 1
              ;;
          esac
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate AgentCore Marketplace configuration
        env:
          MP_AWS_ACCESS_KEY_ID: ${{ vars.MP_AWS_ACCESS_KEY_ID }}
          MP_AWS_SECRET_ACCESS_KEY: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}
          MP_AWS_AGENTCORE_PRODUCT_ID: ${{ vars.MP_AWS_AGENTCORE_PRODUCT_ID }}
        run: |
          test -n "$MP_AWS_ACCESS_KEY_ID" || { echo 'Missing repository variable MP_AWS_ACCESS_KEY_ID.' >&2; exit 1; }
          test -n "$MP_AWS_SECRET_ACCESS_KEY" || { echo 'Missing repository secret MP_AWS_SECRET_ACCESS_KEY.' >&2; exit 1; }
          test -n "$MP_AWS_AGENTCORE_PRODUCT_ID" || { echo 'Missing repository variable MP_AWS_AGENTCORE_PRODUCT_ID.' >&2; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ vars.MP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}

      - name: Login to Marketplace ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$MP_AWS_ECR"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish AgentCore image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.agentcore
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.MP_AWS_ECR }}/${{ env.AGENTCORE_REPOSITORY }}:${{ steps.version.outputs.value }}

      - name: Publish AgentCore CloudFormation template
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          rendered="/tmp/openada-agentcore-runtime.yaml"
          sed -e "s|{RELEASE_VERSION}|$RELEASE_VERSION|g" \
            -e "s|{MP_AWS_ECR}|$MP_AWS_ECR|g" \
            -e "s|{AGENTCORE_REPOSITORY}|$AGENTCORE_REPOSITORY|g" \
            devops/cloudformation/openada-agentcore-runtime.yaml > "$rendered"
          aws s3 cp "$rendered" \
            "s3://$OPENADA_CFT_BUCKET/cloudformation/openada-agentcore-runtime.yaml" \
            --content-type text/yaml --cache-control no-cache --region "$AWS_REGION" --no-progress
          aws s3 cp "$rendered" \
            "s3://$OPENADA_CFT_BUCKET/cloudformation/openada-agentcore-runtime-${RELEASE_VERSION}.yaml" \
            --content-type text/yaml --cache-control no-cache --region "$AWS_REGION" --no-progress
          aws s3 cp ada.sh \
            "s3://$OPENADA_CFT_BUCKET/ada.sh" \
            --content-type text/plain --cache-control no-cache --region "$AWS_REGION" --no-progress

      - name: Submit AgentCore Marketplace changeset
        env:
          MP_AWS_AGENTCORE_PRODUCT_ID: ${{ vars.MP_AWS_AGENTCORE_PRODUCT_ID }}
          MP_AWS_ECR: ${{ env.MP_AWS_ECR }}
          OPENADA_AGENTCORE_REPOSITORY: ${{ env.AGENTCORE_REPOSITORY }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: bash devops/agentcore/changeset.sh
