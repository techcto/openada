name: Publish OpenADA Images to Docker Hub

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: techcto

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract UI image metadata
        id: ui-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/openada-ui
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Extract API image metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/openada-api
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Extract worker image metadata
        id: worker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/openada-worker
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build and publish UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.app
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.ui-meta.outputs.tags }}
          labels: ${{ steps.ui-meta.outputs.labels }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.api
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Build and publish worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.worker
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.worker-meta.outputs.tags }}
          labels: ${{ steps.worker-meta.outputs.labels }}

      - name: Publish image references
        run: |
          {
            echo '### Published Docker Hub images'
            echo "${DOCKERHUB_NAMESPACE}/openada-ui"
            echo "${DOCKERHUB_NAMESPACE}/openada-api"
            echo "${DOCKERHUB_NAMESPACE}/openada-worker"
          } >> "$GITHUB_STEP_SUMMARY"
