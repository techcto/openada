name: Publish OpenADA MCP AgentCore Preview

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Hub tag for the preview image'
        required: true
        default: preview

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'techcto' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub publishing configuration
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo 'Missing repository secret DOCKERHUB_USERNAME.' >&2; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo 'Missing repository secret DOCKERHUB_TOKEN.' >&2; exit 1; }

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish AgentCore preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.agentcore
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.DOCKERHUB_NAMESPACE }}/openada-agentcore:${{ inputs.image_tag }}

      - name: Publish image reference
        run: echo "${DOCKERHUB_NAMESPACE}/openada-agentcore:${{ inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
