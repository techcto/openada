name: Publish OpenADA Containers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  UI_REPOSITORY: ${{ vars.OPENADA_UI_REPOSITORY || 'openada/ui' }}
  API_REPOSITORY: ${{ vars.OPENADA_API_REPOSITORY || 'openada/api' }}
  WORKER_REPOSITORY: ${{ vars.OPENADA_WORKER_REPOSITORY || 'openada/worker' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS publishing configuration
        env:
          MP_AWS_ACCESS_KEY_ID: ${{ secrets.MP_AWS_ACCESS_KEY_ID }}
          MP_AWS_SECRET_ACCESS_KEY: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}
        run: |
          test -n "$MP_AWS_ACCESS_KEY_ID" || {
            echo 'Missing repository secret MP_AWS_ACCESS_KEY_ID.' >&2
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.MP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}
          test -n "$MP_AWS_SECRET_ACCESS_KEY" || {
            echo 'Missing repository secret MP_AWS_SECRET_ACCESS_KEY.' >&2
            exit 1
          }

      - name: Ensure ECR repositories exist
        run: |
          aws ecr describe-repositories --repository-names "$UI_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$UI_REPOSITORY" >/dev/null
          aws ecr describe-repositories --repository-names "$API_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$API_REPOSITORY" >/dev/null
          aws ecr describe-repositories --repository-names "$WORKER_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$WORKER_REPOSITORY" >/dev/null

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract UI image metadata
        id: ui-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr.outputs.registry }}/${{ env.UI_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Extract API image metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr.outputs.registry }}/${{ env.API_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Extract worker image metadata
        id: worker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr.outputs.registry }}/${{ env.WORKER_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and publish UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.app
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.ui-meta.outputs.tags }}
          labels: ${{ steps.ui-meta.outputs.labels }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.api
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Build and publish worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.worker
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.worker-meta.outputs.tags }}
          labels: ${{ steps.worker-meta.outputs.labels }}

      - name: Publish image references
        run: |
          {
            echo '### Published images'
            echo "UI: ${{ steps.ecr.outputs.registry }}/${UI_REPOSITORY}"
            echo "API: ${{ steps.ecr.outputs.registry }}/${API_REPOSITORY}"
            echo "Worker: ${{ steps.ecr.outputs.registry }}/${WORKER_REPOSITORY}"
            echo 'Use the commit SHA tag for CloudFormation deployments.'
          } >> "$GITHUB_STEP_SUMMARY"
