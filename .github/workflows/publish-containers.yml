name: Publish OpenADA Containers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  MP_AWS_ECR: ${{ vars.MP_AWS_ECR || '709825985650.dkr.ecr.us-east-1.amazonaws.com' }}
  MP_AWS_ECR_ACCOUNT_ID: ${{ vars.MP_AWS_ECR_ACCOUNT_ID || '709825985650' }}
  UI_REPOSITORY: ${{ vars.OPENADA_UI_REPOSITORY || 'solodev/openada-ui' }}
  API_REPOSITORY: ${{ vars.OPENADA_API_REPOSITORY || 'solodev/openada-api' }}
  WORKER_REPOSITORY: ${{ vars.OPENADA_WORKER_REPOSITORY || 'solodev/openada-worker' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS publishing configuration
        env:
          MP_AWS_ACCESS_KEY_ID: ${{ vars.MP_AWS_ACCESS_KEY_ID }}
          MP_AWS_SECRET_ACCESS_KEY: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}
        run: |
          test -n "$MP_AWS_ACCESS_KEY_ID" || {
            echo 'Missing repository variable MP_AWS_ACCESS_KEY_ID.' >&2
            exit 1
          }
          test -n "$MP_AWS_SECRET_ACCESS_KEY" || {
            echo 'Missing repository secret MP_AWS_SECRET_ACCESS_KEY.' >&2
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ vars.MP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}

      - name: Login to Marketplace ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$MP_AWS_ECR"

      - name: Verify AWS publishing identity
        run: aws sts get-caller-identity

      - name: Verify Marketplace ECR repositories
        run: |
          for repository in "$UI_REPOSITORY" "$API_REPOSITORY" "$WORKER_REPOSITORY"; do
            aws ecr describe-repositories \
              --registry-id "$MP_AWS_ECR_ACCOUNT_ID" \
              --repository-names "$repository" >/dev/null || {
              echo "Missing ECR repository: $MP_AWS_ECR/$repository" >&2
              echo "Confirm the publishing principal can access registry $MP_AWS_ECR_ACCOUNT_ID." >&2
              exit 1
            }
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract UI image metadata
        id: ui-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MP_AWS_ECR }}/${{ env.UI_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Extract API image metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MP_AWS_ECR }}/${{ env.API_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Extract worker image metadata
        id: worker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MP_AWS_ECR }}/${{ env.WORKER_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and publish UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.app
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.ui-meta.outputs.tags }}
          labels: ${{ steps.ui-meta.outputs.labels }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.api
          target: prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Build and publish worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile.worker
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.worker-meta.outputs.tags }}
          labels: ${{ steps.worker-meta.outputs.labels }}

      - name: Publish image references
        run: |
          {
            echo '### Published images'
            echo "UI: ${MP_AWS_ECR}/${UI_REPOSITORY}"
            echo "API: ${MP_AWS_ECR}/${API_REPOSITORY}"
            echo "Worker: ${MP_AWS_ECR}/${WORKER_REPOSITORY}"
            echo 'Use the commit SHA tag for CloudFormation deployments.'
          } >> "$GITHUB_STEP_SUMMARY"
