AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OpenADA MCP AgentCore -- Amazon Bedrock AgentCore Runtime stack.
  Provisions an AgentCore Runtime pointed at the OpenADA MCP gateway container,
  configured against a hosted or private OpenADA MCP endpoint. There is no native
  CloudFormation resource type for AgentCore runtimes yet, so this stack uses
  a Lambda-backed custom resource to call bedrock-agentcore-control directly
  (same technique used by other AgentCore-provisioning stacks).
  NAMING: The stack name is used as the base for the runtime name and IAM
  role names. Use lowercase letters, numbers, and hyphens only.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Container Image
        Parameters:
          - ContainerImageUri
      - Label:
          default: OpenADA service
        Parameters:
          - OpenAdaMcpUrl
          - OpenAdaApiKey
      - Label:
          default: Network
        Parameters:
          - NetworkMode
          - VpcSubnets
          - VpcSecurityGroups

    ParameterLabels:
      ContainerImageUri:  { default: Container Image URI }
      OpenAdaMcpUrl:      { default: OpenADA MCP URL }
      OpenAdaApiKey:      { default: OpenADA API key }
      NetworkMode:        { default: AgentCore network mode }
      VpcSubnets:         { default: VPC subnets (comma-separated) }
      VpcSecurityGroups:  { default: VPC security groups (comma-separated) }

Parameters:

  # ── Container image ────────────────────────────────────────────────────────
  ContainerImageUri:
    Type: String
    Default: '{MP_AWS_ECR}/{AGENTCORE_REPOSITORY}:{RELEASE_VERSION}'
    Description: >
      ECR image URI for OpenADA MCP AgentCore, including tag. Must be pushed to an ECR
      repository the AgentCore execution role can pull from.

  # ── OpenADA service ────────────────────────────────────────────────────────
  OpenAdaMcpUrl:
    Type: String
    Description: >
      HTTPS URL to the OpenADA MCP endpoint. Use https://openada.us/mcp for the
      public service or the private OpenADA deployment URL for controlled access.

  OpenAdaApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: >
      Optional. OpenADA API key used by the gateway for the outbound MCP request.
      Set this when the selected OpenADA deployment has OPENADA_API_KEYS enabled.

  # ── Network ────────────────────────────────────────────────────────────────
  NetworkMode:
    Type: String
    Default: PUBLIC
    AllowedValues: [PUBLIC, VPC]
    Description: >
      PUBLIC reaches an internet-accessible HTTPS endpoint. VPC places the
      AgentCore runtime in the supplied subnets so it can reach a private
      OpenADA ALB or internal service.

  VpcSubnets:
    Type: String
    Default: ''
    Description: >
      Required when NetworkMode is VPC. Comma-separated private subnet IDs.

  VpcSecurityGroups:
    Type: String
    Default: ''
    Description: >
      Required when NetworkMode is VPC. Comma-separated security group IDs
      that allow HTTPS egress to the private OpenADA service.

Conditions:
  HasOpenAdaApiKey: !Not [!Equals [!Ref OpenAdaApiKey, '']]

Resources:

  # ── Execution role (assumed by the AgentCore runtime process) ──────────────
  AgentCoreExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-exec-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OpenAdaMcpAgentCoreExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EcrPull
                Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                Resource: '*'
              - Sid: EcrAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/*'

  # ── Scoped IAM user + key for external callers to invoke this runtime
  # directly, scoped to this stack's runtime ARN rather than '*'.
  McpInvokerUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub '${AWS::StackName}-mcp-invoker'
      Policies:
        - PolicyName: InvokeOpenAdaMcpRuntime
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AgentCoreInvoke
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                  - bedrock-agentcore:InvokeAgentRuntimeCommand
                  - bedrock-agentcore:GetAgentCard
                Resource:
                  - !GetAtt AgentCoreRuntime.RuntimeArn
                  - !Sub '${AgentCoreRuntime.RuntimeArn}/runtime-endpoint/*'

  McpInvokerAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref McpInvokerUser

  # ── Lambda execution role (for the custom resource) ────────────────────────
  RuntimeProvisionerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-provisioner-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentCoreRuntimeManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:CreateAgentRuntime
                  - bedrock-agentcore:UpdateAgentRuntime
                  - bedrock-agentcore:DeleteAgentRuntime
                  - bedrock-agentcore:GetAgentRuntime
                  - bedrock-agentcore:CreateAgentRuntimeEndpoint
                  - bedrock-agentcore:UpdateAgentRuntimeEndpoint
                  - bedrock-agentcore:DeleteAgentRuntimeEndpoint
                  - bedrock-agentcore:GetAgentRuntimeEndpoint
                  - bedrock-agentcore:CreateWorkloadIdentity
                  - bedrock-agentcore:DeleteWorkloadIdentity
                  - bedrock-agentcore:GetWorkloadIdentity
                Resource: '*'
              - Effect: Allow
                Action: ['iam:PassRole']
                Resource: !GetAtt AgentCoreExecutionRole.Arn
              - Effect: Allow
                Action: ['iam:CreateServiceLinkedRole']
                Resource: '*'

  # ── Lambda that creates / updates / deletes the AgentCore runtime ──────────
  RuntimeProvisionerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-provisioner'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt RuntimeProvisionerRole.Arn
      Code:
        ZipFile: |
          import boto3, json, urllib.request

          SUCCESS = 'SUCCESS'
          FAILED  = 'FAILED'

          def send(event, ctx, status, data, physical_id=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': data.get('Error', 'See CloudWatch logs'),
                  'PhysicalResourceId': physical_id or ctx.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data,
              }).encode()
              req = urllib.request.Request(
                  event['ResponseURL'],
                  data=body,
                  headers={'Content-Type': '', 'Content-Length': len(body)},
                  method='PUT',
              )
              urllib.request.urlopen(req)

          def handler(event, ctx):
              props        = event.get('ResourceProperties', {})
              region       = props.get('Region')
              role_arn     = props.get('RoleArn')
              container_uri = props.get('ContainerUri')
              name         = props.get('AgentName')
              desc         = props.get('AgentDescription', '')
              env_vars     = props.get('EnvironmentVariables', {})
              network_mode = props.get('NetworkMode', 'PUBLIC')
              vpc_subnets  = [value.strip() for value in props.get('VpcSubnets', '').split(',') if value.strip()]
              vpc_groups   = [value.strip() for value in props.get('VpcSecurityGroups', '').split(',') if value.strip()]
              runtime_name = name.replace('-', '_')

              try:
                  network_configuration = {'networkMode': network_mode}
                  if network_mode == 'VPC':
                      if not vpc_subnets or not vpc_groups:
                          raise Exception('VpcSubnets and VpcSecurityGroups are required when NetworkMode is VPC')
                      network_configuration['networkModeConfig'] = {
                          'subnets': vpc_subnets,
                          'securityGroups': vpc_groups,
                          'requireServiceS3Endpoint': True,
                      }

                  # Ensure the AgentCore service-linked role exists before calling CreateAgentRuntime
                  iam = boto3.client('iam')
                  try:
                      iam.create_service_linked_role(AWSServiceName='bedrock-agentcore.amazonaws.com')
                  except Exception:
                      pass  # already exists -- safe to ignore

                  client = boto3.client('bedrock-agentcore-control', region_name=region)
                  runtime_artifact = {
                      'containerConfiguration': {
                          'containerUri': container_uri,
                      },
                  }
                  protocol_configuration = {'serverProtocol': 'MCP'}

                  if event['RequestType'] == 'Create':
                      resp = client.create_agent_runtime(
                          agentRuntimeName=runtime_name,
                          description=desc,
                          roleArn=role_arn,
                          networkConfiguration=network_configuration,
                          agentRuntimeArtifact=runtime_artifact,
                          protocolConfiguration=protocol_configuration,
                          environmentVariables=env_vars,
                      )
                      arn = resp.get('agentRuntimeArn') or resp.get('AgentRuntimeArn', '')
                      send(event, ctx, SUCCESS, {'RuntimeArn': arn, 'RuntimeId': arn.split('/')[-1]}, arn)

                  elif event['RequestType'] == 'Update':
                      physical = event.get('PhysicalResourceId', '')
                      runtime_id = physical.split('/')[-1] if physical else ''
                      if not runtime_id:
                          raise Exception('Missing AgentCore runtime physical resource id for update')
                      resp = client.update_agent_runtime(
                          agentRuntimeId=runtime_id,
                          description=desc,
                          roleArn=role_arn,
                          networkConfiguration=network_configuration,
                          agentRuntimeArtifact=runtime_artifact,
                          protocolConfiguration=protocol_configuration,
                          environmentVariables=env_vars,
                      )
                      arn = resp.get('agentRuntimeArn') or resp.get('AgentRuntimeArn') or physical
                      send(event, ctx, SUCCESS, {'RuntimeArn': arn, 'RuntimeId': runtime_id}, arn)

                  elif event['RequestType'] == 'Delete':
                      physical = event.get('PhysicalResourceId', '')
                      if physical and 'bedrock-agentcore' in physical:
                          runtime_id = physical.split('/')[-1]
                          try:
                              client.delete_agent_runtime(agentRuntimeId=runtime_id)
                          except Exception:
                              pass
                      send(event, ctx, SUCCESS, {}, physical)

              except Exception as exc:
                  send(event, ctx, FAILED, {'Error': str(exc)})

  # ── Custom resource -- triggers the Lambda to create the runtime ───────────
  AgentCoreRuntime:
    Type: Custom::AgentCoreRuntime
    DependsOn: AgentCoreExecutionRole
    Properties:
      ServiceToken: !GetAtt RuntimeProvisionerFunction.Arn
      Region: !Ref AWS::Region
      RoleArn: !GetAtt AgentCoreExecutionRole.Arn
      ContainerUri: !Ref ContainerImageUri
      AgentName: !Ref AWS::StackName
      AgentDescription: OpenADA MCP AgentCore -- stateless gateway for a hosted or private OpenADA service
      NetworkMode: !Ref NetworkMode
      VpcSubnets: !Ref VpcSubnets
      VpcSecurityGroups: !Ref VpcSecurityGroups
      EnvironmentVariables:
        OPENADA_MCP_URL: !Ref OpenAdaMcpUrl
        OPENADA_API_KEY: !If [HasOpenAdaApiKey, !Ref OpenAdaApiKey, !Ref 'AWS::NoValue']

Outputs:

  RuntimeArn:
    Description: AgentCore Runtime ARN for IAM/SigV4-authenticated MCP invocation.
    Value: !GetAtt AgentCoreRuntime.RuntimeArn

  AccessKeyId:
    Description: IAM access key ID for the scoped runtime invoker user. Prefer an IAM role or federation for production.
    Value: !Ref McpInvokerAccessKey

  SecretAccessKey:
    Description: Secret key for the scoped runtime invoker user. Store it immediately and do not expose it in logs.
    Value: !GetAtt McpInvokerAccessKey.SecretAccessKey

  Region:
    Description: AWS Region.
    Value: !Ref AWS::Region

  ExecutionRoleArn:
    Description: IAM role assumed by the AgentCore runtime process.
    Value: !GetAtt AgentCoreExecutionRole.Arn
