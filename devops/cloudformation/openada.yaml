AWSTemplateFormatVersion: '2010-09-09'
Description: OpenADA UI, API, and public scan directory on ECS Fargate behind an ALB.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network prerequisites
        Parameters:
          - VpcId
          - PublicSubnets
          - ServiceSubnets
      - Label:
          default: OpenADA settings
        Parameters:
          - EnvironmentName
          - CertificateArn
          - ApiKeys
          - PublicScansEnabled
          - ScanAllowedHosts
          - CorsAllowedOrigins
          - LanguageToolUpstreamUrl
      - Label:
          default: Scan queue
        Parameters:
          - RedisNodeType
          - RedisAuthToken
      - Label:
          default: Marketplace images
        Parameters:
          - UiImage
          - ApiImage
          - WorkerImage
          - DesiredCount
          - AssignPublicIp
    ParameterLabels:
      VpcId:
        default: VPC
      PublicSubnets:
        default: Public subnets for the load balancer
      ServiceSubnets:
        default: Service subnets with NAT access
      ApiKeys:
        default: Private API key (optional)
      UiImage:
        default: Marketplace UI image (leave unchanged)
      ApiImage:
        default: Marketplace API image (leave unchanged)
      WorkerImage:
        default: Marketplace worker image (leave unchanged)

Parameters:
  EnvironmentName:
    Type: String
    Default: openada
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for the application load balancer.
  ServiceSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for ECS tasks. These subnets need NAT access for image pulls.
  UiImage:
    Type: String
    Default: '{MP_AWS_ECR}/{UI_REPOSITORY}:{RELEASE_VERSION}'
    Description: Marketplace ECR image URI for the OpenADA UI container.
  ApiImage:
    Type: String
    Default: '{MP_AWS_ECR}/{API_REPOSITORY}:{RELEASE_VERSION}'
    Description: Marketplace ECR image URI for the OpenADA API container.
  WorkerImage:
    Type: String
    Default: '{MP_AWS_ECR}/{WORKER_REPOSITORY}:{RELEASE_VERSION}'
    Description: Marketplace ECR image URI for the OpenADA scan worker container.
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
  AssignPublicIp:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
  CertificateArn:
    Type: String
    Default: ''
    Description: Optional ACM certificate ARN for HTTPS.
  ApiKeys:
    Type: String
    Default: ''
    NoEcho: true
  OpenAiAppsChallengeToken:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional token returned at /.well-known/openai-apps-challenge during app submission domain verification.
  LanguageToolUpstreamUrl:
    Type: String
    Default: ''
    Description: Optional managed LanguageTool-compatible base URL.
  CorsAllowedOrigins:
    Type: String
    Default: '*'
  PublicScansEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable anonymous URL submissions to the public scan directory.
  ScanAllowedHosts:
    Type: String
    Default: ''
    Description: Optional comma-separated hostname allowlist for public URL scans.
  RedisNodeType:
    Type: String
    Default: cache.t4g.micro
    Description: ElastiCache node type used for the OpenADA scan queue.
  RedisAuthToken:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional Redis AUTH token. When set, transit encryption is enabled.

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]
  HasRedisAuthToken: !Not [!Equals [!Ref RedisAuthToken, '']]

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref EnvironmentName

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public access to the OpenADA load balancer.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal OpenADA task traffic from the load balancer.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3001
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: OpenADA Redis queue access from ECS tasks.
      VpcId: !Ref VpcId

  RedisIngressFromServices:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RedisSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref ServiceSecurityGroup

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${EnvironmentName}-alb'
      Scheme: internet-facing
      Subnets: !Ref PublicSubnets
      SecurityGroups: [!Ref AlbSecurityGroup]
      Type: application

  UiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${EnvironmentName}-ui'
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /
      HealthCheckPort: '3000'

  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${EnvironmentName}-api'
      Port: 3001
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /api/health
      HealthCheckPort: '3001'

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref UiTargetGroup

  ApiListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: [/api/*]
      Actions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref ApiTargetGroup

  McpListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 9
      Conditions:
        - Field: path-pattern
          Values: [/mcp, /mcp/*]
      Actions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref ApiTargetGroup

  OpenAiAppsChallengeListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 8
      Conditions:
        - Field: path-pattern
          Values: [/.well-known/openai-apps-challenge]
      Actions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref ApiTargetGroup

  HttpsListener:
    Condition: HasCertificate
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref UiTargetGroup

  HttpsApiListenerRule:
    Condition: HasCertificate
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: [/api/*]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  HttpsMcpListenerRule:
    Condition: HasCertificate
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 9
      Conditions:
        - Field: path-pattern
          Values: [/mcp, /mcp/*]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  HttpsOpenAiAppsChallengeListenerRule:
    Condition: HasCertificate
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 8
      Conditions:
        - Field: path-pattern
          Values: [/.well-known/openai-apps-challenge]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: openada-directory-data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt SitesTable.Arn
                  - !GetAtt PagesTable.Arn
                  - !GetAtt ScansTable.Arn
                  - !GetAtt ScanJobsTable.Arn

  SitesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-sites'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  PagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-pages'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ScansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-scans'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ScanJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-scan-jobs'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: OpenADA scan queue subnet group.
      SubnetIds: !Ref ServiceSubnets

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub '${EnvironmentName} asynchronous scan queue'
      Engine: redis
      CacheNodeType: !Ref RedisNodeType
      NumCacheClusters: 1
      AutomaticFailoverEnabled: false
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds: [!Ref RedisSecurityGroup]
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: !If [HasRedisAuthToken, true, false]
      AuthToken: !If [HasRedisAuthToken, !Ref RedisAuthToken, !Ref AWS::NoValue]

  UiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${EnvironmentName}/ui'
      RetentionInDays: 30

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${EnvironmentName}/api'
      RetentionInDays: 30

  UiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${EnvironmentName}-ui'
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: ui
          Image: !Ref UiImage
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: '3000'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref UiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ui

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${EnvironmentName}-api'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Ref ApiImage
          Essential: true
          PortMappings:
            - ContainerPort: 3001
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: '3001'
            - Name: OPENADA_API_KEYS
              Value: !Ref ApiKeys
            - Name: OPENAI_APPS_CHALLENGE_TOKEN
              Value: !Ref OpenAiAppsChallengeToken
            - Name: OPENADA_CORS_ORIGINS
              Value: !Ref CorsAllowedOrigins
            - Name: LANGUAGETOOL_UPSTREAM_URL
              Value: !Ref LanguageToolUpstreamUrl
            - Name: OPENADA_SITES_TABLE
              Value: !Ref SitesTable
            - Name: OPENADA_PAGES_TABLE
              Value: !Ref PagesTable
            - Name: OPENADA_SCANS_TABLE
              Value: !Ref ScansTable
            - Name: OPENADA_SCAN_JOBS_TABLE
              Value: !Ref ScanJobsTable
            - Name: OPENADA_REDIS_HOST
              Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
            - Name: OPENADA_REDIS_PORT
              Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
            - Name: OPENADA_REDIS_TLS
              Value: !If [HasRedisAuthToken, 'true', 'false']
            - Name: OPENADA_REDIS_PASSWORD
              Value: !Ref RedisAuthToken
            - Name: OPENADA_PUBLIC_SCANS_ENABLED
              Value: !Ref PublicScansEnabled
            - Name: OPENADA_SCAN_ALLOWED_HOSTS
              Value: !Ref ScanAllowedHosts
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  UiService:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: !Sub '${EnvironmentName}-ui'
      Cluster: !Ref Cluster
      TaskDefinition: !Ref UiTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups: [!Ref ServiceSecurityGroup]
          Subnets: !Ref ServiceSubnets
      LoadBalancers:
        - ContainerName: ui
          ContainerPort: 3000
          TargetGroupArn: !Ref UiTargetGroup

  ApiService:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: !Sub '${EnvironmentName}-api'
      Cluster: !Ref Cluster
      TaskDefinition: !Ref ApiTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups: [!Ref ServiceSecurityGroup]
          Subnets: !Ref ServiceSubnets
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 3001
          TargetGroupArn: !Ref ApiTargetGroup

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${EnvironmentName}/worker'
      RetentionInDays: 30

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${EnvironmentName}-worker'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Ref WorkerImage
          Essential: true
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: OPENADA_SCAN_JOBS_TABLE
              Value: !Ref ScanJobsTable
            - Name: OPENADA_SITES_TABLE
              Value: !Ref SitesTable
            - Name: OPENADA_PAGES_TABLE
              Value: !Ref PagesTable
            - Name: OPENADA_SCANS_TABLE
              Value: !Ref ScansTable
            - Name: LANGUAGETOOL_UPSTREAM_URL
              Value: !Ref LanguageToolUpstreamUrl
            - Name: OPENADA_REDIS_HOST
              Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
            - Name: OPENADA_REDIS_PORT
              Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
            - Name: OPENADA_REDIS_TLS
              Value: !If [HasRedisAuthToken, 'true', 'false']
            - Name: OPENADA_REDIS_PASSWORD
              Value: !Ref RedisAuthToken
            - Name: OPENADA_SCAN_WORKER_CONCURRENCY
              Value: '1'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker

  WorkerService:
    Type: AWS::ECS::Service
    DependsOn: RedisReplicationGroup
    Properties:
      ServiceName: !Sub '${EnvironmentName}-worker'
      Cluster: !Ref Cluster
      TaskDefinition: !Ref WorkerTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups: [!Ref ServiceSecurityGroup]
          Subnets: !Ref ServiceSubnets

Outputs:
  WebsiteUrl:
    Description: OpenADA UI URL.
    Value:
      Fn::If:
        - HasCertificate
        - !Sub 'https://${LoadBalancer.DNSName}'
        - !Sub 'http://${LoadBalancer.DNSName}'
  ApiBaseUrl:
    Description: Set the CMS languagetool provider endpoint_url to this base URL.
    Value:
      Fn::If:
        - HasCertificate
        - !Sub 'https://${LoadBalancer.DNSName}/api'
        - !Sub 'http://${LoadBalancer.DNSName}/api'
  ClusterName:
    Value: !Ref Cluster
