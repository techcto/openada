services:
  app:
    init: true
    build:
      context: .
      target: ${APP_ENV:-dev}
      dockerfile: ./devops/docker/Dockerfile.app
      args:
        APP_ENV: ${APP_ENV:-dev}
    environment:
      API_HOST: api
      API_PORT: 3001
      PORT: 3000
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - ./next.config.ts:/app/next.config.ts
      - ./src:/app/src
    ports:
      - '${APP_PORT:-3000}:3000'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy

  api:
    init: true
    build:
      context: .
      target: ${APP_ENV:-dev}
      dockerfile: ./devops/docker/Dockerfile.api
    environment:
      PORT: 3001
      NODE_ENV: development
      OPENADA_CORS_ORIGINS: ${OPENADA_CORS_ORIGINS:-http://localhost:3000}
      OPENADA_API_KEYS: ${OPENADA_API_KEYS:-}
      OPENADA_DYNAMODB_ENDPOINT: http://dynamodb:8000
      OPENADA_SCAN_JOBS_TABLE: ${OPENADA_SCAN_JOBS_TABLE:-openada-local-scan-jobs}
      OPENADA_SITES_TABLE: ${OPENADA_SITES_TABLE:-openada-local-sites}
      OPENADA_PAGES_TABLE: ${OPENADA_PAGES_TABLE:-openada-local-pages}
      OPENADA_SCANS_TABLE: ${OPENADA_SCANS_TABLE:-openada-local-scans}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      OPENADA_REDIS_HOST: redis
      OPENADA_REDIS_PORT: 6379
      OPENADA_REDIS_TLS: 'false'
      LANGUAGETOOL_UPSTREAM_URL: ${LANGUAGETOOL_UPSTREAM_URL:-}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - ./api/lib:/app/lib
      - ./api/pages:/app/pages
    command: ["sh", "-c", "node /app/scripts/init-local-dynamodb.mjs && npm run dev"]
    ports:
      - '${API_PORT:-3001}:3001'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      dynamodb:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - openada-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  dynamodb:
    image: amazon/dynamodb-local:2.6.1
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal"]
    volumes:
      - openada-dynamodb:/home/dynamodblocal
    ports:
      - '${DYNAMODB_PORT:-8000}:8000'

  worker:
    init: true
    build:
      context: .
      dockerfile: ./devops/docker/Dockerfile.worker
    environment:
      NODE_ENV: development
      OPENADA_REDIS_HOST: redis
      OPENADA_REDIS_PORT: 6379
      OPENADA_REDIS_TLS: 'false'
      OPENADA_SCAN_WORKER_CONCURRENCY: ${OPENADA_SCAN_WORKER_CONCURRENCY:-1}
      OPENADA_DYNAMODB_ENDPOINT: http://dynamodb:8000
      OPENADA_SITES_TABLE: ${OPENADA_SITES_TABLE:-openada-local-sites}
      OPENADA_PAGES_TABLE: ${OPENADA_PAGES_TABLE:-openada-local-pages}
      OPENADA_SCANS_TABLE: ${OPENADA_SCANS_TABLE:-openada-local-scans}
      OPENADA_SCAN_JOBS_TABLE: ${OPENADA_SCAN_JOBS_TABLE:-openada-local-scan-jobs}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      LANGUAGETOOL_UPSTREAM_URL: ${LANGUAGETOOL_UPSTREAM_URL:-}
    volumes:
      - ./api/lib:/app/lib
      - ./api/worker.ts:/app/worker.ts
    depends_on:
      redis:
        condition: service_healthy
      dynamodb:
        condition: service_started

volumes:
  openada-redis:
  openada-dynamodb:
